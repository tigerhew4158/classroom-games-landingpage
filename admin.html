<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课堂游戏订单后台</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:"Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;background:#071527;color:#f8fbff}
    .wrap{width:min(1280px,calc(100% - 32px));margin:0 auto;padding:28px 0 60px}
    h1{font-size:38px;margin:0 0 10px}
    p{color:#cbd5e1;line-height:1.7}
    .login,.toolbar,.order{background:#0d213e;border:1px solid rgba(147,197,253,.22);border-radius:22px;padding:18px;margin:16px 0;box-shadow:0 14px 40px rgba(0,0,0,.24)}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;background:#06172e;color:#fff;border:1px solid rgba(147,197,253,.28);border-radius:12px;padding:11px 13px}
    textarea{min-height:80px}
    button{border:0;border-radius:12px;padding:11px 15px;font-weight:1000;cursor:pointer;background:linear-gradient(90deg,#2563eb,#7c3aed);color:#fff}
    button.secondary{background:#334155}
    button.good{background:#16a34a}
    .row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end}
    .toolbar{display:grid;grid-template-columns:1fr 220px 160px;gap:12px;align-items:end}
    .orderGrid{display:grid;grid-template-columns:1.3fr .9fr .8fr;gap:14px}
    .meta{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    .pill{display:inline-flex;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:1000;background:#1d4ed8;margin:2px}
    .pill.pending{background:#f59e0b;color:#111827}.pill.paid{background:#16a34a}.pill.sent{background:#7c3aed}.pill.cancelled{background:#dc2626}
    .small{font-size:13px;color:#cbd5e1}
    .templates{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .proof{display:block;margin-top:8px;color:#93c5fd;font-weight:900}
    .orderText{white-space:pre-wrap;background:#06172e;border:1px solid rgba(147,197,253,.18);border-radius:14px;padding:12px;max-height:240px;overflow:auto;font-size:13px;color:#dbeafe}
    .hidden{display:none}
    .error{color:#fecaca;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);padding:12px;border-radius:14px;margin:12px 0}
    .success{color:#bbf7d0;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);padding:12px;border-radius:14px;margin:12px 0}
    @media(max-width:900px){.toolbar,.orderGrid,.meta,.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>课堂游戏订单后台</h1>
    <p>查看购买者资料、配套、模板编号、付款截图，并更新订单状态。</p>

    <section class="login" id="loginBox">
      <div class="row">
        <div>
          <label>管理员密码</label>
          <input id="password" type="password" placeholder="输入 ADMIN_PASSWORD">
        </div>
        <button id="loginBtn">进入后台</button>
      </div>
      <div id="msg"></div>
    </section>

    <section class="toolbar hidden" id="toolbar">
      <div>
        <label>搜索</label>
        <input id="search" placeholder="姓名 / 电话 / 电邮 / 模板编号">
      </div>
      <div>
        <label>状态</label>
        <select id="statusFilter">
          <option value="">全部状态</option>
          <option value="pending">待确认</option>
          <option value="paid">已确认付款</option>
          <option value="sent">已发送账号</option>
          <option value="cancelled">取消 / 有问题</option>
        </select>
      </div>
      <button id="refreshBtn">刷新订单</button>
    </section>

    <div id="orders"></div>
  </div>

<script>
let ADMIN_PASSWORD = localStorage.getItem('admin_password') || '';
let ORDERS = [];

const $ = (id)=>document.getElementById(id);

function msg(text, type='error'){
  $('msg').innerHTML = text ? `<div class="${type}">${text}</div>` : '';
}

function fmtDate(v){
  if(!v) return '-';
  try { return new Date(v).toLocaleString('zh-CN'); } catch(e){ return v; }
}

function money(v){ return `RM${Number(v || 0).toFixed(0)}`; }

function statusText(s){
  return {
    pending:'待确认',
    paid:'已确认付款',
    sent:'已发送账号',
    cancelled:'取消 / 有问题'
  }[s] || s || 'pending';
}

async function loadOrders(){
  const res = await fetch('/api/admin-orders?password=' + encodeURIComponent(ADMIN_PASSWORD));
  const data = await res.json();
  if(!res.ok || !data.ok) throw new Error(data.error || '读取订单失败');
  ORDERS = data.orders || [];
  renderOrders();
}

function matchOrder(o){
  const q = $('search').value.trim().toLowerCase();
  const st = $('statusFilter').value;
  if(st && o.status !== st) return false;
  if(!q) return true;
  const all = [
    o.buyer_name,o.buyer_phone,o.buyer_email,o.plan,
    JSON.stringify(o.selected_templates || []),
    o.order_text
  ].join(' ').toLowerCase();
  return all.includes(q);
}

function renderOrders(){
  const list = ORDERS.filter(matchOrder);
  if(!list.length){
    $('orders').innerHTML = '<p>没有订单。</p>';
    return;
  }
  $('orders').innerHTML = list.map(o => `
    <article class="order" data-id="${o.id}">
      <div class="orderGrid">
        <div>
          <h2>${o.buyer_name || '-'}</h2>
          <div class="small">${fmtDate(o.created_at)}</div>
          <div class="meta">
            <div><b>电话</b><br>${o.buyer_phone || '-'}</div>
            <div><b>电邮</b><br>${o.buyer_email || '-'}</div>
            <div><b>配套</b><br>${o.plan || '-'}</div>
            <div><b>状态</b><br><span class="pill ${o.status || 'pending'}">${statusText(o.status)}</span></div>
            <div><b>原价</b><br>${money(o.original_price)}</div>
            <div><b>特价</b><br>${money(o.final_price)}</div>
            <div><b>优惠</b><br>${money(o.discount_amount)}</div>
            <div><b>订单ID</b><br><span class="small">${o.id}</span></div>
          </div>
          <div class="templates">${(Array.isArray(o.selected_templates)?o.selected_templates:[]).map(x=>`<span class="pill">${x}</span>`).join('')}</div>
          ${o.payment_proof_url ? `<a class="proof" href="${o.payment_proof_url}" target="_blank">查看付款截图</a>` : '<span class="small">没有付款截图</span>'}
        </div>
        <div>
          <label>订单内容</label>
          <div class="orderText">${escapeHtml(o.order_text || '')}</div>
        </div>
        <div>
          <label>状态</label>
          <select class="statusSelect">
            <option value="pending" ${o.status==='pending'?'selected':''}>待确认</option>
            <option value="paid" ${o.status==='paid'?'selected':''}>已确认付款</option>
            <option value="sent" ${o.status==='sent'?'selected':''}>已发送账号</option>
            <option value="cancelled" ${o.status==='cancelled'?'selected':''}>取消 / 有问题</option>
          </select>
          <label style="margin-top:12px;display:block">管理员备注</label>
          <textarea class="adminNote" placeholder="备注">${escapeHtml(o.admin_note || '')}</textarea>
          <button class="good saveBtn" style="margin-top:12px;width:100%">保存状态 / 备注</button>
        </div>
      </div>
    </article>
  `).join('');

  document.querySelectorAll('.saveBtn').forEach(btn => btn.addEventListener('click', saveOrder));
}

function escapeHtml(s=''){
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
}

async function saveOrder(e){
  const card = e.target.closest('.order');
  const id = card.dataset.id;
  const status = card.querySelector('.statusSelect').value;
  const admin_note = card.querySelector('.adminNote').value;

  const res = await fetch('/api/admin-orders', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password: ADMIN_PASSWORD, id, status, admin_note, sent_account_at: status === 'sent' ? new Date().toISOString() : null })
  });
  const data = await res.json();
  if(!res.ok || !data.ok) return alert(data.error || '保存失败');
  await loadOrders();
}

$('loginBtn').onclick = async ()=>{
  ADMIN_PASSWORD = $('password').value.trim();
  if(!ADMIN_PASSWORD) return msg('请输入管理员密码。');
  localStorage.setItem('admin_password', ADMIN_PASSWORD);
  try{
    await loadOrders();
    $('loginBox').classList.add('hidden');
    $('toolbar').classList.remove('hidden');
    msg('');
  }catch(e){
    msg(e.message || '登录失败');
  }
};

$('refreshBtn').onclick = loadOrders;
$('search').oninput = renderOrders;
$('statusFilter').onchange = renderOrders;

if(ADMIN_PASSWORD){
  $('password').value = ADMIN_PASSWORD;
}
</script>
</body>
</html>
